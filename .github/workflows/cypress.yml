name: Cypress Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 */4 * * *'   # Smoke: a cada 4 horas
    - cron: '0 12 * * *'    # Regressivo completo: todo dia ao meio-dia

jobs:
  smoke:
    name: Smoke Tests — PR/Push para develop
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'pull_request' && github.base_ref == 'develop') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 */4 * * *')

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Análise estática do código (lint)
        run: npm run lint

      - name: Executar testes Smoke — API
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_grepTags: '@smoke'

      - name: Executar testes Smoke — Frontend
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend/**/*.cy.js
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_grepTags: '@smoke'

      - name: Upload de screenshots em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-smoke
          path: cypress/screenshots
          if-no-files-found: ignore

  regressivo:
    name: Regressivo Completo — PR/Push para main
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *')

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Análise estática do código (lint)
        run: npm run lint

      - name: Executar testes Regressivos — API
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/api/**/*.cy.js
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_grepTags: '@regressivo'

      - name: Executar testes Regressivos — Frontend
        uses: cypress-io/github-action@v6
        with:
          spec: cypress/e2e/frontend/**/*.cy.js
          browser: chrome
          headed: false
          install: false
        env:
          CYPRESS_grepTags: '@regressivo'

      - name: Upload de screenshots em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-regressivo
          path: cypress/screenshots
          if-no-files-found: ignore
